<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>禹合制所 YUHE DESIGN｜需求表已送出</title>
<style>
  :root{
    --paper:#faf8f4; --card:#ffffff; --ink:#2b2b28; --line:#ddd6c9;
    --accent:#8a6d4b; --accent-deep:#6f563a; --accent-light:#f1ebe0; --muted:#8b8578;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; font-family:"Noto Sans TC","Microsoft JhengHei",sans-serif;
    background:var(--paper); color:var(--ink); line-height:1.7;
    display:flex; min-height:100vh; align-items:center; justify-content:center;
    padding:24px 16px;
  }
  .card{
    background:var(--card); border:1px solid var(--line); border-radius:16px;
    max-width:480px; width:100%; padding:40px 28px; text-align:center;
    box-shadow:0 2px 10px rgba(60,50,30,.07);
  }
  .ok{font-size:56px; line-height:1;}
  h1{font-size:22px; letter-spacing:3px; margin:18px 0 6px;}
  .brand{font-size:12.5px; color:var(--muted); letter-spacing:2px;}
  p{color:var(--muted); font-size:14.5px; margin:14px 0 0;}
  .line-box{
    background:var(--accent-light); border:1px solid var(--line); border-radius:12px;
    padding:18px; margin-top:22px; font-size:14px;
  }
  .line-box img{
    width:140px; height:140px; display:block; margin:10px auto 6px;
    border:1px solid var(--line); border-radius:10px; background:#fff;
  }
  .line-box a{color:var(--accent-deep); font-weight:700;}
  .small{font-size:12px; color:var(--muted);}
</style>
</head>
<body>
  <div class="card">
    <div class="ok">✅</div>
    <h1>需求表已送出</h1>
    <div class="brand">禹合制所 YUHE DESIGN</div>
    <p>我們已收到您的資料，會盡快與您聯繫。<br>麻煩在 LINE 跟我們說一聲「已填寫完成」！</p>
    <div class="line-box">
      還沒加入官方 LINE 嗎？
      <img src="line-qrcode.png" alt="禹合制所官方LINE QRcode">
      <span class="small">掃描加入禹合制所官方 LINE</span><br>
      <a href="https://line.me/R/ti/p/@yuhedesign" target="_blank">LINE ID：@yuhedesign</a>
    </div>
  </div>
</body>
</html>
