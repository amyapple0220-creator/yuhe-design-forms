<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>禹合制所 YUHE DESIGN｜3D渲染比對 3D RENDER</title>
<style>
  :root{
    --ink:#2b2b28;
    --paper:#faf8f4;
    --line:#d9d3c7;
    --accent:#8a6d4b;
    --accent-light:#f1ebe0;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Noto Sans TC","Microsoft JhengHei",sans-serif;
    background:var(--paper);
    color:var(--ink);
    line-height:1.7;
  }
  header{
    text-align:center;
    padding:56px 20px 32px;
    border-bottom:1px solid var(--line);
  }
  header .en{
    font-family:Georgia,"Times New Roman",serif;
    font-size:34px;
    letter-spacing:6px;
    margin:0 0 8px;
  }
  header h1{
    font-size:20px;
    font-weight:500;
    letter-spacing:6px;
    margin:0 0 14px;
  }
  header p{
    margin:0 auto;
    max-width:560px;
    color:#7a7468;
    font-size:14px;
    letter-spacing:1px;
  }
  main{
    max-width:960px;
    margin:0 auto;
    padding:40px 20px 90px;
  }
  .project-title{
    text-align:center;
    margin:10px 0 34px;
  }
  .project-title h2{
    font-size:22px;
    font-weight:600;
    letter-spacing:2px;
    margin:0 0 6px;
  }
  .project-title .sub{
    font-family:Georgia,serif;
    color:#7a7468;
    font-size:15px;
    letter-spacing:1px;
  }
  .project-title .sub::before,
  .project-title .sub::after{
    content:"—";
    color:var(--line);
    margin:0 10px;
  }

  /* ===== 比對滑桿元件 ===== */
  figure.compare-block{
    margin:0 0 56px;
  }
  .compare{
    position:relative;
    width:100%;
    overflow:hidden;
    border-radius:6px;
    border:1px solid var(--line);
    background:#e8e4dc;
    user-select:none;
    -webkit-user-select:none;
    touch-action:pan-y;          /* 保留頁面直向捲動，水平拖曳給滑桿 */
    cursor:ew-resize;
  }
  .compare img{
    display:block;
    width:100%;
    height:auto;
    pointer-events:none;
  }
  .compare .before-wrap{
    position:absolute;
    inset:0;
    overflow:hidden;
    width:var(--pos,50%);
  }
  .compare .before-wrap img{
    position:absolute;
    inset:0;
    width:auto;
    height:100%;
    max-width:none;
  }
  .compare .divider{
    position:absolute;
    top:0;
    bottom:0;
    left:var(--pos,50%);
    width:2px;
    background:#fff;
    box-shadow:0 0 6px rgba(0,0,0,.35);
    transform:translateX(-1px);
  }
  .compare .handle{
    position:absolute;
    top:50%;
    left:var(--pos,50%);
    transform:translate(-50%,-50%);
    width:52px;
    height:52px;
    border-radius:50%;
    background:#fff;
    box-shadow:0 2px 10px rgba(0,0,0,.28);
    display:flex;
    align-items:center;
    justify-content:center;
    gap:6px;
    color:var(--ink);
    font-size:15px;
    border:none;
    cursor:ew-resize;
    padding:0;
  }
  .compare .handle:focus-visible{
    outline:3px solid var(--accent);
    outline-offset:2px;
  }
  .compare .tag{
    position:absolute;
    bottom:14px;
    background:rgba(255,255,255,.92);
    color:var(--ink);
    font-size:12px;
    letter-spacing:1px;
    padding:4px 12px;
    border-radius:3px;
    opacity:0;
    transition:opacity .25s;
    pointer-events:none;
  }
  .compare .tag.before{left:14px;}
  .compare .tag.after{right:14px;}
  .compare.show-before .tag.before,
  .compare.show-after .tag.after{opacity:1;}

  figcaption{
    text-align:center;
    margin-top:16px;
    font-size:17px;
    letter-spacing:3px;
  }
  figcaption .en{
    display:block;
    font-family:Georgia,serif;
    font-size:12px;
    letter-spacing:2px;
    color:#9a917f;
    margin-top:2px;
  }

  footer{
    border-top:1px solid var(--line);
    text-align:center;
    padding:30px 20px 44px;
    font-size:13px;
    color:#7a7468;
    letter-spacing:1px;
  }
  footer .brand{
    font-size:15px;
    color:var(--ink);
    letter-spacing:3px;
    margin-bottom:4px;
  }
</style>
</head>

<script>
(function(){
  document.querySelectorAll('.compare').forEach(function(box){
    var handle = box.querySelector('.handle');
    var beforeImg = box.querySelector('.before-wrap img');
    var pos = 50;
    var dragging = false;

    // before 圖的寬度要跟容器一致，才不會隨裁切變形
    function syncWidth(){
      beforeImg.style.width = box.clientWidth + 'px';
      beforeImg.style.height = 'auto';
    }
    window.addEventListener('resize', syncWidth);
    if (beforeImg.complete) syncWidth(); else beforeImg.addEventListener('load', syncWidth);

    function setPos(p){
      pos = Math.min(96, Math.max(4, p));
      box.style.setProperty('--pos', pos + '%');
      box.classList.toggle('show-before', pos > 60);
      box.classList.toggle('show-after', pos < 40);
    }

    function posFromEvent(e){
      var rect = box.getBoundingClientRect();
      var x = (e.touches ? e.touches[0].clientX : e.clientX) - rect.left;
      setPos(x / rect.width * 100);
    }

    box.addEventListener('pointerdown', function(e){
      dragging = true;
      box.setPointerCapture(e.pointerId);
      posFromEvent(e);
    });
    box.addEventListener('pointermove', function(e){
      if (dragging) posFromEvent(e);
    });
    box.addEventListener('pointerup', function(){ dragging = false; });
    box.addEventListener('pointercancel', function(){ dragging = false; });

    handle.addEventListener('keydown', function(e){
      if (e.key === 'ArrowLeft'){ setPos(pos - 3); e.preventDefault(); }
      if (e.key === 'ArrowRight'){ setPos(pos + 3); e.preventDefault(); }
    });

    setPos(50);
    syncWidth();
  });
})();
</script>
